kind = "web"
previewPath = "/"
title = "Video Link Manager"
version = "1.0.0"
id = "artifacts/video-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20952

[services.development]
run = "pnpm --filter @workspace/video-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-manager", "run", "build" ]
publicDir = "artifacts/video-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20952"
BASE_PATH = "/"
