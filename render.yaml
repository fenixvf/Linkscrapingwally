databases:
  - name: video-manager-db
    databaseName: video_manager
    user: video_manager
    plan: free

services:
  - type: web
    name: video-manager-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: video-manager-db
          property: connectionString

  - type: web
    name: video-manager-frontend
    runtime: static
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/video-manager run build
    staticPublishPath: artifacts/video-manager/dist/public
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: video-manager-api
          property: url
      - key: BASE_PATH
        value: /
